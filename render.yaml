services:
  - type: web
    name: ems-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENTSOE_API_KEY
        sync: false   # Stel handmatig in via Render dashboard → Environment
      - key: EM_API_KEY
        sync: false   # Optioneel
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://ems-api.onrender.com  # Wordt aangevuld met echte URL na eerste deploy
